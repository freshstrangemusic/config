[aliases]
l = ["log", "--reversed"]
s = ["l", "-r", "stack()"]
wip = ["l", "-r", "wip()"]
heads = ["l", "-r", "wip_heads()"]
descmany = ["describe", "--config", "templates.draft_commit_description='description'"]

[revset-aliases]
"stack()" = "fork_point(mutable()::@)- | fork_point(mutable()::@)::"
"wip()" = "mutable()- | mutable()::heads(mutable())"
"wip_heads()" = "heads(mutable() & mine() & empty())- | heads(mutable() & mine() & ~empty())"

[ui]
default-command = ["s"]
diff-editor = ":builtin"
diff-formatter = ":git"
conflict-marker-style = "git"

[user]
name = "Beth Rennie"
email = "beth@brennie.ca"

[templates]
draft_commit_description = '''
concat(
  description,
  surround(
    "\nJJ: This commit contains the following changes:\n", "",
    indent("JJ:     ", diff.stat(72)),
  ),
  surround("\nJJ: Diff:\n", "", indent("JJ:  ", diff.git(4)))
)
'''
git_push_bookmark = '"freshstrangemusic/push-" ++ change_id.short()'

[template-aliases]
oneline = 'commit_id.short() ++ " " ++ pad_end(30, author.name(), " ") ++ author.timestamp() ++ " " ++  description.first_line() ++  "\n"'

[[--scope]]
--when.commands = ["diff", "show"]
[--scope.ui]
pager = "delta"

[visualjj]
snapshot-enabled = false
